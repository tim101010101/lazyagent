[package]
name = "lazyagent"
version = "0.1.0"
edition = "2021"
description = "A lazygit-style TUI for managing AI coding agent sessions"

[dependencies]
ratatui = "0.29"
crossterm = "0.28"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
dirs = "6"
anyhow = "1"

[dev-dependencies]
tempfile = "3"
